name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Maven verify
        run: ./mvnw -B verify

      - name: Set up SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: SAM validate
        run: sam validate --lint

      - name: SAM build (Makefile)
        run: sam build
