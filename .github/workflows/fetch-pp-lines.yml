name: Fetch PrizePicks Lines

on:
  repository_dispatch:
    types: [fetch-pp-lines]
  schedule:
    # Every 15 min on high-activity windows (UTC).
    - cron: "0,15,30,45 14-23 * * 4,5,6,0"
    - cron: "0,15,30,45 0-5 * * 5,6,0,1"
    # Night-before fetch window.
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      PP_LEAGUE_ID: "7"
      PP_PER_PAGE: "250"
      PP_TIMEOUT_SECONDS: "30"
      PP_SINGLE_STAT: "true"
      PP_S3_REGION: "us-east-1"
      PP_S3_KEY_PREFIX: "prizepicks/lines"
      PP_WRITE_ARCHIVE_COPY: "true"
      PP_ALLOW_EMPTY_LINES: "false"
      PP_LOG_LEVEL: "INFO"
      PP_S3_BUCKET: ${{ secrets.PP_S3_BUCKET }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python3 -m pip install --upgrade pip && python3 -m pip install curl_cffi boto3 nba_api

      - name: Fetch, normalize, and upload PrizePicks lines
        run: |
          python3 scripts/fetch_pp_lines.py \
            --league-id "${PP_LEAGUE_ID}" \
            --per-page "${PP_PER_PAGE}" \
            --timeout-seconds "${PP_TIMEOUT_SECONDS}" \
            --single-stat \
            --s3-bucket "${PP_S3_BUCKET}" \
            --s3-region "${PP_S3_REGION}" \
            --s3-key-prefix "${PP_S3_KEY_PREFIX}" \
            --write-archive-copy \
            --no-allow-empty-lines \
            --log-level "${PP_LOG_LEVEL}"
